name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    name: Build and Release
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: loomiq-linux-x86_64
            asset_name: loomiq-linux-x86_64
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact_name: loomiq-macos-x86_64
            asset_name: loomiq-macos-x86_64
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact_name: loomiq-macos-arm64
            asset_name: loomiq-macos-arm64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: loomiq-windows-x86_64.exe
            asset_name: loomiq-windows-x86_64.exe

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build Release
        run: cargo build --release --target ${{ matrix.target }}

      - name: Rename Binary
        shell: bash
        run: |
          cd target/${{ matrix.target }}/release
          mv loomiq-cli ${{ matrix.artifact_name }} || mv loomiq-cli.exe ${{ matrix.artifact_name }}

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: target/${{ matrix.target }}/release/${{ matrix.artifact_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
